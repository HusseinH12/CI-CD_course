on:
  workflow_dispatch:
jobs:
 if-job:
   runs-on: ubuntu-latest
   steps:
     - name: print message
       run: echo "the step is running"
       if: ${{ github.event_name == 'push' }}  # we used the operators in the condition and here the step will only work if the event is push
    
     - name: print another message
       run: echo "this step works without WIP in the commit message"
       if: ${{ !contains(github.event.head_commit.message, 'WIP') }} # this if condition is just for demo it won't work because we use manual trigger
